#cloud-config
---
hostname: ${hostname}
fqdn: ${fqdn}
manage_etc_hosts: true

users:
  - name: nicolas.fuentes
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: wheel
    home: /home/nicolas.fuentes
    shell: /bin/bash
    lock_passwd: false
    ssh-authorized-keys:
      - ${public_key}

ssh_pwauth: true
disable_root: false

chpasswd:
  expire: false
  list:
    - nicolas.fuentes:linux

packages:
  - qemu-guest-agent
  - python3
  - glibc-langpack-es

runcmd:
  - localectl set-locale LANG=es_CL.UTF-8
  - localectl set-keymap latam
  - localectl set-x11-keymap latam pc105
  - echo "Cloud-Init termino exitosamente la configuracion" > /root/bootcmd.log

final_message: "The system is finally up, after $UPTIME seconds"
